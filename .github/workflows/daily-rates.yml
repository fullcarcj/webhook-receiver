name: Daily Rates Fetch

on:
  schedule:
    - cron: "30 8 * * 1-5"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Trigger currency fetch endpoint
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          test -n "$RENDER_URL"
          test -n "$DATABASE_URL"
          test -n "$CRON_SECRET"
          # Solo la raíz del servicio Node (p. ej. https://nombre.onrender.com). Sin path extra ni barra final.
          BASE="${RENDER_URL//[[:space:]]/}"
          BASE="${BASE%/}"
          while [[ "$BASE" == */ ]]; do BASE="${BASE%/}"; done
          echo "GET ${BASE}/health"
          curl -fsS -o /dev/null -w "health HTTP %{http_code}\n" "${BASE}/health"
          echo "POST ${BASE}/api/currency/fetch"
          curl -fsS -X POST "${BASE}/api/currency/fetch" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json"

