# Recordatorio tarde (Venezuela 14:20): despacho hasta 17:00, delivery, tasa BCV. Cron UTC 18:20 = 14:20 Caracas (UTC−4).
# Si cambiás ML_RETIRO_AFTERNOON_SEND_AT, recalculá el cron UTC.
# Requiere secret DATABASE_URL. ML_RETIRO_ENABLED=1 en el job.

name: Retiro ML — tarde

on:
  schedule:
    - cron: "20 18 * * *"
  workflow_dispatch:

concurrency:
  group: retiro-broadcast-afternoon
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Mensajes despacho (tarde)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          ML_RETIRO_ENABLED: "1"
          ML_RETIRO_SLOT: "afternoon"
          ML_RETIRO_LOOKBACK_DAYS: "14"
          ML_RETIRO_ORDER_STATUS: "confirmed"
          ML_RETIRO_TIMEZONE: "America/Caracas"
          ML_RETIRO_AFTERNOON_SEND_AT: "14:20"
          ML_RETIRO_ENFORCE_SEND_AT: "0"
        run: node ml-retiro-broadcast.js --all --slot=afternoon
