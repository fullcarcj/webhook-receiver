# Recordatorio mañana (Venezuela 7:30): retiro + feedback pendiente en ambos lados.
# Cron UTC = 11:30 → hora local America/Caracas 7:30 (UTC−4). Si cambiás ML_RETIRO_MORNING_SEND_AT, recalculá UTC.
# Manual: workflow_dispatch.
# Requiere secret DATABASE_URL. ML_RETIRO_ENABLED=1 en el job.
# Sin ML_RETIRO_ORDER_STATUS: incluye órdenes ML status pending y confirmed (no cancelled/invalid).

name: Retiro ML — mañana

on:
  schedule:
    - cron: "30 11 * * *"
  workflow_dispatch:

concurrency:
  group: retiro-broadcast-morning
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # Evita aviso deprecación Node 20 en checkout/setup-node (GitHub Actions 2026).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Mensajes retiro (mañana)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          ML_RETIRO_ENABLED: "1"
          ML_RETIRO_SLOT: "morning"
          ML_RETIRO_LOOKBACK_DAYS: "14"
          ML_RETIRO_TIMEZONE: "America/Caracas"
          # Hora local de envío (referencia; debe coincidir con el cron UTC de arriba). Opcional: ML_RETIRO_ENFORCE_SEND_AT=1
          ML_RETIRO_MORNING_SEND_AT: "07:30"
          ML_RETIRO_ENFORCE_SEND_AT: "0"
        run: node ml-retiro-broadcast.js --all --slot=morning
