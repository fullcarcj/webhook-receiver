<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fbmp_edge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #d0d9ee;
      padding: 16px;
    }
    h1 { font-size: 14px; font-weight: 700; color: #6fa3f7; margin-bottom: 4px; }
    p.sub { font-size: 11px; color: #4a5568; margin-bottom: 16px; }
    label { font-size: 12px; color: #8899bb; display: block; margin-bottom: 4px; }
    input {
      width: 100%;
      background: #161e2e;
      border: 1px solid #2a3651;
      border-radius: 6px;
      color: #d0d9ee;
      font-size: 12px;
      padding: 7px 10px;
      outline: none;
      margin-bottom: 12px;
    }
    input:focus { border-color: #3b82f6; }
    .row { display: flex; gap: 8px; }
    button {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    #btnSave  { background: #2563eb; color: #fff; }
    #btnTest  { background: #1a2540; color: #6fa3f7; }
    #status {
      margin-top: 12px;
      font-size: 11px;
      min-height: 16px;
      color: #6b7a99;
    }
    #status.ok  { color: #34d399; }
    #status.err { color: #f87171; }
  </style>
</head>
<body>
  <h1>fbmp_edge — Marketplace Bridge</h1>
  <p class="sub">Configuración del puente ERP ↔ Facebook</p>

  <label for="backendUrl">URL del backend</label>
  <input id="backendUrl" type="url" placeholder="https://tu-backend.onrender.com" />

  <label for="secret">FBMP_EDGE_INGEST_SECRET</label>
  <input id="secret" type="password" placeholder="Bearer token del backend" />

  <div class="row">
    <button id="btnSave">Guardar</button>
    <button id="btnTest">Probar conexión</button>
  </div>

  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
